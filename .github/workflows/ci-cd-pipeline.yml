name: CI/CD Pipeline

on:
  push:
    branches: [ "produzione" ]
    
jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
         python-version: '3.11'
        
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip 
          pip install -r requirements.txt
    
      - name: Post Validation Test
        run: python3 -m unittest -v tests/PostValidation.py
    
  static-analisys:
    runs-on: ubuntu-latest
    needs: tests
    if: needs.tests.result == 'success'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
         python-version: '3.11'
        
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip 
          pip install -r requirements.txt
        
      - name: Check for debug-mode
        run: python3 -m unittest -v tests/StaticAnalisys.py
  
  deploy:
    name: Deploy to EC2
    needs: static-analisys
    if: needs.static-analisys.result == 'success'

    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
      # Copy the code to ec2 istance via ssh
      - name: Copy project files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          source: "."
          target: "/home/ec2-user/progetto-cloud-and-edge-computing"
      # Launch docker-compose
      - name: Run docker-compose on EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          script: |
            cd ~/progetto-cloud-and-edge-computing
            docker-compose down || true
            docker-compose up -d --build
